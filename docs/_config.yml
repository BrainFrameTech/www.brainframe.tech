# ─────────────────────────────────────────────────────────────────────────────
# Site settings
# These rarely change. NOTE: _config.yml is NOT reloaded while `jekyll serve` is
# running — restart the server after editing this file.
# For everyday copy (headlines, features, footer), edit _data/content.yml instead.
# ─────────────────────────────────────────────────────────────────────────────

title: BrainFrame
tagline: Your knowledge, connected to its source.
description: >-
  BrainFrame is a local-first personal knowledge management system and universal
  reader — read PDF, EPUB, DOCX, Markdown, archived web pages and more, take
  notes, and keep every note linked to the source it came from.
email: datacyclist@gmail.com

# Production URL. Leave baseurl empty for a root-domain site (brainframe.tech).
url: "https://brainframe.tech"
baseurl: ""

# Brand assets (paths are relative to the site root).
logo: /assets/img/brainframe.png
banner: /assets/img/brainframe-banner.png

# Build settings — no external theme; layouts live in _layouts/.
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Blog posts live in _posts/ and use the "post" layout by default.
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

# Exclude non-site files from the build output.
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
