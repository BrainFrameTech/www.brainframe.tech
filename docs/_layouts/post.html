---
layout: default
---
<article class="page">
  <a class="back-link" href="{{ '/blog/' | relative_url }}">← All posts</a>
  <h1 style="margin-top:18px">{{ page.title }}</h1>
  <div class="meta">
    {{ page.date | date: "%B %-d, %Y" }}
    {%- if page.categories.size > 0 %} · {{ page.categories | join: " / " }}{% endif -%}
  </div>
  <div class="page-content">
    {{ content }}
  </div>
</article>
