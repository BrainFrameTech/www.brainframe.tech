# ═════════════════════════════════════════════════════════════════════════════
# BrainFrame landing-page copy
# ─────────────────────────────────────────────────────────────────────────────
# This file is the one place to edit the words on the home page. Change the text
# here and the site rebuilds automatically (with `jekyll serve`). No HTML needed.
# ═════════════════════════════════════════════════════════════════════════════

# ── Top navigation links ─────────────────────────────────────────────────────
nav:
  - label: Features
    url: "#features"
  - label: Philosophy
    url: "#philosophy"
  - label: Roadmap
    url: "/roadmap/"
  - label: Blog
    url: "/blog/"

# ── Hero (the first thing visitors see) ──────────────────────────────────────
hero:
  eyebrow: Personal knowledge management, reimagined
  headline: Your knowledge, connected to its source.
  subhead: >-
    BrainFrame is a local-first reader and note-taking system that keeps every
    thought linked to the material it came from — images and Markdown now, more
    formats on the way — across every device you own.
  primary_cta:
    label: Test on iOS & Android
    url: "/test-mobile"
  secondary_cta:
    label: Read the story
    url: "/blog/"

# ── Feature grid ─────────────────────────────────────────────────────────────
# Add, remove, or reorder freely. `icon` is a short emoji or symbol.
features:
  - icon: "📚"
    title: Read your files
    body: >-
      Images and Markdown work today. PDF, EPUB, DOCX, archived web pages, and
      even Linux man pages are on the roadmap — one reader, more formats over
      time.
  - icon: "🔗"
    title: Notes linked to source
    body: >-
      The idea at the heart of BrainFrame: every note keeps a durable link back to
      the passage that inspired it, so you always know where it came from. That
      linking isn't built yet — it's the core of the [roadmap](/roadmap/).
  - icon: "🗂️"
    title: See notes in context
    body: >-
      Read a note on its own, or in the flow of the source it came from, following
      your thinking back to where it started. It depends on the linking that's
      still ahead — planned, not working today.
  - icon: "💻"
    title: Built for every device
    body: >-
      Windows and Linux desktop builds run today; a macOS build is provided but
      untested — treat it as experimental for now. Native iOS and Android apps
      and cross-device sync are in active development — see the [roadmap](/roadmap/).
  - icon: "🔒"
    title: Your data, yours first
    body: >-
      Everything lives on your devices by default. Notes in plain text, links in
      open formats you can follow without us. The cloud is an option, never a
      requirement.
  - icon: "🧭"
    title: Connect ideas
    body: >-
      The payoff BrainFrame is building toward: a second brain that links sources,
      notes, and thoughts once scattered across apps and formats. That connective
      layer isn't here yet — it's what the linking work unlocks.

# ── Philosophy / "why" section ───────────────────────────────────────────────
philosophy:
  heading: Built on principles, not lock-in
  intro: >-
    Today's tools are remarkable, but each is an incomplete take on the same
    idea. BrainFrame is built around a few commitments we won't compromise.
  points:
    - title: Local-first
      body: >-
        Your library and notes live on your machine. Work offline, own your
        files, and never depend on someone else's servers to reach your ideas.
    - title: Open, neutral formats
      body: >-
        Notes are plain text. Source links are stored so you can find your way
        back to an idea even without BrainFrame installed.
    - title: One idea, fully realized
      body: >-
        Obsidian, Notion, Roam, Org-mode and others each capture a piece of this
        vision. BrainFrame is the attempt to implement the whole of it.

# ── Call to action: mobile testing ───────────────────────────────────────────
# BrainFrame is open for testing now. This CTA sends people to the iOS/Android
# tester sign-up (served at /test-mobile, which redirects to the Google Form).
test_cta:
  heading: Help put BrainFrame on your phone
  body: >-
    BrainFrame's mobile apps are almost ready for testing. Sign up to be among
    the first testers on iOS and Android, and help push toward a public launch
    on the App Store and Google Play.
  button_label: Sign up to test on iOS & Android
  url: "/test-mobile"
  # Reciprocal contact line shown beneath the button. The address itself comes
  # from `email:` in _config.yml so it only ever lives in one place.
  contact_note: >-
    You share your email to test BrainFrame — here's mine, in the same spirit.
    Questions, ideas, or just want to talk? Write anytime:

# ── Roadmap page (/roadmap/) ─────────────────────────────────────────────────
# A curated, high-level highlight reel — NOT the full issue tracker. Keep it to a
# handful of items. `today` is what actually ships right now; everything under
# `flagship` and `items` is planned direction, in no fixed order. No dates.
roadmap:
  eyebrow: Where this is going
  heading: The direction, not a schedule
  intro: >-
    BrainFrame is deliberately ambitious, so here's an honest map: what works
    today, the work happening right now, and the shape of where it's headed. It's
    a direction, not a timetable — and not a promise about the order things land.

  today:
    heading: What works today
    body: >-
      Right now BrainFrame is a desktop app you can run, with a working Markdown
      editor and live preview — you can write notes and read them back. That's the
      honest extent of it today. The linking that connects a note to its source
      doesn't work yet — not even internal wikilinks — and since that connection
      is the whole point of BrainFrame, it's exactly where the work is headed.
      Everything below is where it goes from here.

  # Flagship, in-progress item — gets its own highlighted treatment.
  flagship:
    tag: In active development
    title: Cross-device sync
    body: >-
      This is the work happening right now. We're building CRDT-based sync so your
      notes and library stay consistent across every device — offline-first, with
      no central server in the middle. It's the meatiest, most interesting problem
      in the whole project, and the most rewarding place for a contributor to jump
      in and make a real dent.

  # Elevated priority — its own highlighted card just below the flagship, to
  # signal that linking is the near-term focus. It's what makes BrainFrame what
  # it's for, and none of it works yet.
  priority:
    tag: Next priority
    title: Linking notes to their sources
    body: >-
      This is the capability that makes BrainFrame what it's for — and today none
      of it works, not even internal wikilinks. So it's moving to the front of the
      line: durable links from a note back to the exact passage it came from,
      backlinks between notes, and reading a note in the flow of its source.
      Making this real is the near-term focus.

  # Planned direction. Bullets, intentionally unordered — these may not happen in
  # this sequence. Add, remove, or reword freely.
  items:
    - title: Public release on iOS and Android
      body: >-
        The mobile apps are in active development. Tester builds come first —
        [sign up to be among the first to get them](/test-mobile) — and the
        destination is a full public launch on the App Store and Google Play.
    - title: Broader format support
      body: >-
        Today the reader handles images and Markdown. This is everything after
        that — PDF, EPUB, DOCX, archived web pages, even Linux man pages — each one
        brought in and cross-linked the same way, so more of your library lives in
        one place.
    - title: Optional cloud sync and backup
      body: >-
        For those who want it, an opt-in cloud layer for sync and backup — never
        required, always in keeping with local-first.
    - title: A standalone BrainFrame device
      body: >-
        The long-horizon idea: dedicated hardware for reading and note-taking, away
        from a general-purpose computer.

  cta:
    body: >-
      This is the direction, not a schedule. If any of it is the kind of thing
      you'd want to help build, that's exactly why it's out in the open.
    button_label: Explore the project on GitHub
    url: https://github.com/BrainFrameTech

# ── Footer ───────────────────────────────────────────────────────────────────
